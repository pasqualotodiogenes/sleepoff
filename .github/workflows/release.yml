name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Build and publish Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Windows packaging tools
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
          "$(go env GOPATH)\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Generate Windows resources
        shell: pwsh
        run: ./scripts/generate-resource.ps1 -Version "${{ github.ref_name }}" -OutFile "resource.syso"

      - name: Validate source
        shell: pwsh
        run: |
          go test ./...
          go vet ./...

      - name: Publish portable release assets
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path dist -Recurse -Filter sleepoff.exe | Select-Object -First 1 -ExpandProperty FullName
          if (-not $exe) {
            throw "sleepoff.exe not found under dist"
          }
          ./scripts/package-installer.ps1 -Version "${{ github.ref_name }}" -ExecutablePath $exe -OutputDir "dist"

      - name: Append installer checksum
        shell: pwsh
        run: |
          $checksums = Join-Path (Resolve-Path dist) "checksums.txt"
          $installer = Join-Path (Resolve-Path dist) "sleepoff-setup.exe"
          $hash = (Get-FileHash -Path $installer -Algorithm SHA256).Hash.ToLowerInvariant()
          Add-Content -Path $checksums -Value "$hash  sleepoff-setup.exe"

      - name: Upload installer and refreshed checksums
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" "dist/sleepoff-setup.exe" "dist/checksums.txt" --clobber
